{{- if and .Values.httproute.enabled .Values.trafficPolicy.rateLimit.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ include "lookout.fullname" . }}-rate-limit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lookout.labels" . | nindent 4 }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "lookout.name" . }}
  rateLimit:
    type: Local
    local:
      rules:
      - limit:
          requests: {{ .Values.trafficPolicy.rateLimit.requests }}
          unit: {{ .Values.trafficPolicy.rateLimit.unit }}
{{- end }}
