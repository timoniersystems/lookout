{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "lookout-app.fullname" . }}-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lookout-app.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: SecretStore
  target:
    name: {{ include "lookout-app.fullname" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      {{- if .Values.externalSecrets.secretTemplate }}
      {{- toYaml .Values.externalSecrets.secretTemplate | nindent 6 }}
      {{- else }}
      data:
        NVD_API_KEY: "{{ `{{ .NVD_API_KEY }}` }}"
      {{- end }}
  data:
    {{- range .Values.externalSecrets.secrets }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        {{- if .property }}
        property: {{ .property }}
        {{- end }}
    {{- end }}
{{- end }}
