{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStore.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lookout-app.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.aws.region }}
      {{- if .Values.externalSecrets.aws.role }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.externalSecrets.serviceAccount.name | default "default" }}
      {{- else if .Values.externalSecrets.aws.credentialsSecret }}
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: {{ .Values.externalSecrets.aws.credentialsSecret }}
            key: access-key-id
          secretAccessKeySecretRef:
            name: {{ .Values.externalSecrets.aws.credentialsSecret }}
            key: secret-access-key
      {{- end }}
{{- end }}
