{{- if and .Values.secrets.NVD_API_KEY (not .Values.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lookout-app.fullname" . }}
  labels:
    {{- include "lookout-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  NVD_API_KEY: {{ .Values.secrets.NVD_API_KEY | quote }}
{{- end }}
