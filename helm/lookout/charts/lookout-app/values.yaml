replicaCount: 2

image:
  repository: ghcr.io/timoniersystems/lookout
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 3000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Environment variables
env:
  DGRAPH_HOST: "dgraph-alpha"
  DGRAPH_PORT: "9080"

# Secrets (use sealed-secrets or external-secrets in production)
secrets:
  NVD_API_KEY: ""

# External Secrets configuration
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  aws:
    region: "us-west-2"
    role: ""  # Leave empty to use EC2 instance role
  secretStore:
    name: "aws-secrets-manager"
  serviceAccount:
    name: "default"
  secrets:
    - secretKey: NVD_API_KEY
      remoteKey: "lookout/staging/nvd-api-key"
      property: NVD_API_KEY

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}
