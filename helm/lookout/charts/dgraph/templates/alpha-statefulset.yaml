{{- if .Values.alpha.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dgraph-alpha
  labels:
    app.kubernetes.io/name: dgraph
    app.kubernetes.io/component: alpha
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  serviceName: dgraph-alpha
  replicas: {{ .Values.alpha.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dgraph
      app.kubernetes.io/component: alpha
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dgraph
        app.kubernetes.io/component: alpha
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.alpha.securityContext | nindent 8 }}
      containers:
      - name: alpha
        image: "{{ .Values.alpha.image.repository }}:{{ .Values.alpha.image.tag }}"
        imagePullPolicy: {{ .Values.alpha.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.alpha.service.ports.http }}
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.alpha.service.ports.grpc }}
          protocol: TCP
        command:
        - dgraph
        - alpha
        - --my=dgraph-alpha-0.dgraph-alpha:7080
        - --zero=dgraph-zero-0.dgraph-zero:{{ .Values.zero.service.ports.grpc }}
        - --security=whitelist=0.0.0.0/0
        - --bindall=true
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.alpha.service.ports.http }}
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.alpha.service.ports.http }}
          initialDelaySeconds: 20
          periodSeconds: 5
        resources:
          {{- toYaml .Values.alpha.resources | nindent 12 }}
        {{- if .Values.alpha.persistence.enabled }}
        volumeMounts:
        - name: data
          mountPath: /dgraph
        {{- end }}
  {{- if .Values.alpha.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
        {{- toYaml .Values.alpha.persistence.accessModes | nindent 8 }}
      {{- if .Values.alpha.persistence.storageClass }}
      storageClassName: {{ .Values.alpha.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.alpha.persistence.size }}
  {{- end }}
{{- end }}
