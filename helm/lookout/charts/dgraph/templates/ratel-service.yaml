{{- if .Values.ratel.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: dgraph-ratel
  labels:
    app.kubernetes.io/name: dgraph
    app.kubernetes.io/component: ratel
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ .Values.ratel.service.type }}
  ports:
  - name: http
    port: {{ .Values.ratel.service.port }}
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: dgraph
    app.kubernetes.io/component: ratel
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
