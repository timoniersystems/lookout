apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lookout-production
  namespace: argocd
  annotations:
    # ArgoCD Image Updater: deploy latest semver tag (e.g., v1.0.0, v1.2.3)
    argocd-image-updater.argoproj.io/image-list: lookout=ghcr.io/timoniersystems/lookout
    argocd-image-updater.argoproj.io/lookout.update-strategy: semver
    argocd-image-updater.argoproj.io/lookout.allow-tags: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    argocd-image-updater.argoproj.io/lookout.pull-secret: pullsecret:production/ghcr-secret
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/timoniersystems/lookout.git
    targetRevision: main
    path: helm/lookout
    helm:
      valueFiles:
        - values.production.yaml
      parameters:
        - name: lookout-app.image.repository
          value: ghcr.io/timoniersystems/lookout
        - name: lookout-app.image.tag
          value: latest
        - name: lookout-app.imagePullSecrets[0].name
          value: ghcr-secret

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences in certain fields that ArgoCD shouldn't manage
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
