name: Docker Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Compute source hash for cache key
      id: source_hash
      run: |
        # Create hash of source files to detect changes
        SOURCE_HASH=$(find . -type f \( -name "*.go" -o -name "go.mod" -o -name "go.sum" \) -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1 | cut -c1-8)
        echo "hash=${SOURCE_HASH}" >> $GITHUB_OUTPUT
        echo "Source hash: ${SOURCE_HASH}"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64  # linux/arm64 commented out for performance
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # Use source hash in cache key to invalidate on code changes
        # This ensures fresh builds when source files change
        cache-from: type=gha,scope=${{ github.ref_name }}-${{ steps.source_hash.outputs.hash }}
        cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ steps.source_hash.outputs.hash }}
        no-cache: false
        pull: true
        build-args: |
          GO_VERSION=1.26.0
          TRIVY_VERSION=0.69.1

    - name: Run Trivy vulnerability scanner on image (SARIF)
      uses: aquasecurity/trivy-action@0.30.0
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Trivy vulnerability scanner on image (Table)
      uses: aquasecurity/trivy-action@0.30.0
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: 'table'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'

  docker-compose:
    name: Test Docker Compose
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Create .env file
      run: |
        cat > .env << EOF
        DGRAPH_HOST=dgraph-alpha
        DGRAPH_PORT=9080
        SERVER_PORT=3000
        EOF

    - name: Generate TLS certificates
      run: |
        chmod +x ./scripts/generate-certs.sh
        ./scripts/generate-certs.sh

    - name: Start services
      run: |
        docker compose up -d
        echo "Waiting for services to start..."
        sleep 30

    - name: Check services health
      run: |
        echo "=== Container Status ==="
        docker compose ps
        echo ""
        echo "=== Container Logs ==="
        docker compose logs --tail=50

    - name: Test Dgraph connectivity
      run: |
        echo "Testing dgraph-alpha health endpoint..."
        curl -f http://localhost:8080/health || exit 1
        echo "✓ Dgraph is healthy"

    - name: Test lookout-ui directly
      run: |
        echo "Testing lookout-ui health endpoint via nginx (distroless doesn't have curl)..."
        # Test via nginx since distroless container doesn't include curl
        curl -k -f https://localhost:7443/health || exit 1
        echo "✓ Lookout UI is healthy (tested via nginx)"

    - name: Test nginx HTTPS endpoint
      run: |
        echo "Testing nginx HTTPS health endpoint (port 7443)..."
        curl -k -f https://localhost:7443/health || exit 1
        echo "✓ Nginx HTTPS is working"

    - name: Test nginx HTTP redirect
      run: |
        echo "Testing HTTP to HTTPS redirect (port 7080)..."
        response=$(curl -I -s http://localhost:7080/ | head -1)
        echo "Response: $response"
        if echo "$response" | grep -q "301"; then
          echo "✓ HTTP redirect is working"
        else
          echo "✗ HTTP redirect failed"
          exit 1
        fi

    - name: Test lookout-ui binary exists
      run: |
        echo "Verifying lookout-ui binary in container..."
        docker exec lookout-app ls -lh /app/lookout-ui
        docker exec lookout-app file /app/lookout-ui
        echo "✓ Binary exists and is executable"

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "=== Full Service Logs ==="
        docker compose logs

    - name: Stop services
      if: always()
      run: docker compose down -v
