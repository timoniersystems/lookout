name: Docker Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
      - 'cmd/**'
      - 'pkg/**'
      - 'scripts/**'

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-id: ${{ steps.docker_build.outputs.imageid }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Compute source hash for cache key
      id: source_hash
      run: |
        # Create hash of source files to detect changes
        SOURCE_HASH=$(find . -type f \( -name "*.go" -o -name "go.mod" -o -name "go.sum" \) -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1 | cut -c1-8)
        echo "hash=${SOURCE_HASH}" >> $GITHUB_OUTPUT
        echo "Source hash: ${SOURCE_HASH}"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build Docker image
      id: docker_build
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
      with:
        context: .
        platforms: linux/amd64  # linux/arm64 commented out for performance
        load: true  # Load to local Docker for scanning
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # Use source hash in cache key to invalidate on code changes
        cache-from: type=gha,scope=${{ github.ref_name }}-${{ steps.source_hash.outputs.hash }}
        cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ steps.source_hash.outputs.hash }}
        no-cache: false
        pull: true
        build-args: |
          GO_VERSION=1.26.1
          TRIVY_VERSION=0.69.3

    - name: Export Docker image
      run: |
        # Save image to tar for upload
        docker save ${{ steps.docker_build.outputs.imageid }} -o /tmp/image.tar
        gzip /tmp/image.tar

    - name: Upload Docker image
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: docker-image-${{ github.sha }}
        path: /tmp/image.tar.gz
        retention-days: 1

  scan-json:
    name: Trivy Scan (JSON)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
    - name: Download Docker image
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: docker-image-${{ github.sha }}
        path: /tmp

    - name: Load Docker image
      run: |
        gunzip /tmp/image.tar.gz
        docker load -i /tmp/image.tar

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478  # 0.34.2
      with:
        image-ref: ${{ needs.build.outputs.image-id }}
        format: json
        output: trivy-results.json
        severity: CRITICAL,HIGH,MEDIUM,LOW

    - name: Upload Trivy artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: trivy-report-${{ github.sha }}
        path: trivy-results.json
        retention-days: 30

  scan-extra:
    name: Trivy Scan (${{ matrix.format }})
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: sarif
            severity: CRITICAL,HIGH,MEDIUM
          - format: table
            severity: CRITICAL,HIGH
            continue-on-error: true

    steps:
    - name: Download Docker image
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: docker-image-${{ github.sha }}
        path: /tmp

    - name: Load Docker image
      run: |
        gunzip /tmp/image.tar.gz
        docker load -i /tmp/image.tar

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478  # 0.34.2
      continue-on-error: ${{ matrix.continue-on-error == true }}
      with:
        image-ref: ${{ needs.build.outputs.image-id }}
        format: ${{ matrix.format }}
        output: trivy-results.${{ matrix.format }}
        severity: ${{ matrix.severity }}

    - name: Upload Trivy results to GitHub Security
      if: matrix.format == 'sarif'
      uses: github/codeql-action/upload-sarif@820e3160e279568db735cee8ed8f8e77a6da7818  # v3
      with:
        sarif_file: trivy-results.${{ matrix.format }}

  push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, scan-json]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
    - name: Download Docker image
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: docker-image-${{ github.sha }}
        path: /tmp

    - name: Load Docker image
      run: |
        gunzip /tmp/image.tar.gz
        docker load -i /tmp/image.tar

    - name: Tag Docker image
      run: |
        # Tag the loaded image with all required tags
        IMAGE_ID="${{ needs.build.outputs.image-id }}"
        for tag in $(echo "${{ needs.build.outputs.tags }}" | tr ',' '\n'); do
          echo "Tagging ${IMAGE_ID} as ${tag}"
          docker tag "${IMAGE_ID}" "${tag}"
        done

    - name: Log in to Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker image to registry
      id: push
      run: |
        # Push all tags to registry
        for tag in $(echo "${{ needs.build.outputs.tags }}" | tr ',' '\n'); do
          echo "Pushing $tag"
          docker push "$tag"
        done
        # Capture digest for attestation
        DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ needs.build.outputs.image-id }}" 2>/dev/null | cut -d@ -f2 || \
                 docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main --verbose 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Descriptor',{}).get('digest',''))" 2>/dev/null || echo "")
        echo "digest=$DIGEST" >> $GITHUB_OUTPUT

    - name: Attest container image
      uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true

  docker-compose:
    name: Test Docker Compose
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Create .env file
      run: |
        cat > .env << EOF
        DGRAPH_HOST=dgraph-alpha
        DGRAPH_PORT=9080
        SERVER_PORT=3000
        EOF

    - name: Generate TLS certificates
      run: |
        chmod +x ./scripts/generate-certs.sh
        ./scripts/generate-certs.sh

    - name: Start services
      run: |
        docker compose up -d
        echo "Waiting for services to start..."
        sleep 30

    - name: Check services health
      run: |
        echo "=== Container Status ==="
        docker compose ps
        echo ""
        echo "=== Container Logs ==="
        docker compose logs --tail=50

    - name: Test Dgraph connectivity
      run: |
        echo "Testing dgraph-alpha health endpoint..."
        curl -f http://localhost:8080/health || exit 1
        echo "✓ Dgraph is healthy"

    - name: Test lookout-ui directly
      run: |
        echo "Testing lookout-ui health endpoint via nginx (distroless doesn't have curl)..."
        # Test via nginx since distroless container doesn't include curl
        curl -k -f https://localhost:7443/health || exit 1
        echo "✓ Lookout UI is healthy (tested via nginx)"

    - name: Test nginx HTTPS endpoint
      run: |
        echo "Testing nginx HTTPS health endpoint (port 7443)..."
        curl -k -f https://localhost:7443/health || exit 1
        echo "✓ Nginx HTTPS is working"

    - name: Test nginx HTTP redirect
      run: |
        echo "Testing HTTP to HTTPS redirect (port 7080)..."
        response=$(curl -I -s http://localhost:7080/ | head -1)
        echo "Response: $response"
        if echo "$response" | grep -q "301"; then
          echo "✓ HTTP redirect is working"
        else
          echo "✗ HTTP redirect failed"
          exit 1
        fi

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "=== Full Service Logs ==="
        docker compose logs

    - name: Stop services
      if: always()
      run: docker compose down -v
