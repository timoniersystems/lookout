name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
      with:
        go-version: '1.26'

    - name: Run tests
      run: go test -v ./...

    - name: Build binaries
      run: |
        # Build CLI for multiple platforms
        GOOS=linux GOARCH=amd64 go build -ldflags "-X main.Version=${{ github.ref_name }}" -o lookout-linux-amd64 ./cmd/cli
        GOOS=linux GOARCH=arm64 go build -ldflags "-X main.Version=${{ github.ref_name }}" -o lookout-linux-arm64 ./cmd/cli
        GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.Version=${{ github.ref_name }}" -o lookout-darwin-amd64 ./cmd/cli
        GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.Version=${{ github.ref_name }}" -o lookout-darwin-arm64 ./cmd/cli
        GOOS=windows GOARCH=amd64 go build -ldflags "-X main.Version=${{ github.ref_name }}" -o lookout-windows-amd64.exe ./cmd/cli

        # Build UI for Linux
        GOOS=linux GOARCH=amd64 go build -ldflags "-X main.Version=${{ github.ref_name }}" -o lookout-ui-linux-amd64 ./cmd/ui

    - name: Generate checksums
      run: |
        sha256sum lookout-* > checksums.txt

    - name: Attest binaries
      uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
      with:
        subject-path: lookout-*

    - name: Generate changelog
      id: changelog
      run: |
        # Get previous tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        # Generate changelog
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi

        # Save to file
        echo "$CHANGELOG" > CHANGELOG.txt

        # Set output for GitHub release
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
      with:
        draft: false
        prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        generate_release_notes: true
        body: |
          ## What's Changed

          ${{ steps.changelog.outputs.changelog }}

          ## Installation

          ### CLI
          Download the appropriate binary for your platform and run:
          ```bash
          # Linux/macOS
          chmod +x lookout-*
          ./lookout-* --version

          # Move to PATH
          sudo mv lookout-* /usr/local/bin/lookout
          ```

          ### Docker
          ```bash
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          ```

          ## Checksums
          See `checksums.txt` for SHA256 checksums of all binaries.
        files: |
          lookout-*
          checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          ghcr.io/${{ github.repository }}:latest
        build-args: |
          GO_VERSION=1.26.1
          ALPINE_VERSION=3.23
          TRIVY_VERSION=0.69.3
          VERSION=${{ github.ref_name }}
          COMMIT=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  update-production:
    name: Update Production Image Tag
    needs: publish-docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        ref: main

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Update production values
      run: |
        sed -i "s/tag: \".*\"  # Managed by ArgoCD Image Updater (semver)/tag: \"${{ steps.version.outputs.version }}\"  # Managed by ArgoCD Image Updater (semver)/" helm/lookout/values.production.yaml

    - name: Create pull request
      id: pr
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        BRANCH="release/update-production-tag-${{ steps.version.outputs.version }}"
        git checkout -b "$BRANCH"
        git add helm/lookout/values.production.yaml
        git commit -m "Update production image tag to ${{ steps.version.outputs.version }}"
        git push origin "$BRANCH"
        PR_URL=$(gh pr create \
          --title "Update production image tag to ${{ steps.version.outputs.version }}" \
          --body "Automated update of production image tag following release of \`${{ github.ref_name }}\`." \
          --base main \
          --head "$BRANCH")
        echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Approve pull request
      run: gh pr review "${{ steps.pr.outputs.pr_url }}" --approve
      env:
        GH_TOKEN: ${{ secrets.RELEASE_BOT_PAT }}

    - name: Enable auto-merge
      run: gh pr merge "${{ steps.pr.outputs.pr_url }}" --squash --auto
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
